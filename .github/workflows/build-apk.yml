name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download source ZIP
        run: |
          curl -LO forge-source.zip "https://app.zaro.ai/api/files/download?fid=a707f5de-b586-4b76-8c7b-9189f79b0727&exp=1781937753&sig=Hyo2615-2-uDDlwEADYyaw"
      - name: Extract ZIP
        run: unzip -o forge-source.zip
      - name: Show files
        run: find . -type f | wc -l
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Debug APK
        run: cd Forge-omega11-main && gradle assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: forge-omega-v70-debug
          path: Forge-omega11-main/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
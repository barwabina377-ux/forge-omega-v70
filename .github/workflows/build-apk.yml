name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download source ZIP
        run: curl -L -o forge-source.zip "https://app.zaro.ai/api/files/download?fid=a707f5de-b586-4b76-8c7b-9189f79b0727&exp=1781937967&sig=qvcEbuGhT2hfDXcGL95uQw"
      - name: Extract ZIP
        run: unzip -o forge-source.zip
      - name: Show structure
        run: |
          echo "=== Files ==="
          find Forge-omega11-main -type f | sort | head -50
          echo ""
          echo "=== Total ==="
          find Forge-omega11-main -type f | wc -l
          echo ""
          echo "=== Build files ==="
          ls -la Forge-omega11-main/build.gradle.kts Forge-omega11-main/settings.gradle.kts Forge-omega11-main/app/build.gradle.kts 2>/dev/null
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Debug APK
        run: |
          cd Forge-omega11-main
          echo "org.gradle.caching=false" >> gradle.properties
          echo "org.gradle.configuration-cache=false" >> gradle.properties
          gradle assembleDebug --no-daemon --no-configuration-cache --stacktrace --info
        timeout-minutes: 10
      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: forge-omega-v70-debug
          path: Forge-omega11-main/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn